name: Monitor Upstream Releases

on:
  schedule:
    # Runs every Monday at 9:00 AM UTC (3:00 AM CST)
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Check for new upstream releases
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Get latest release from upstream
            let upstreamRelease;
            try {
              upstreamRelease = await github.rest.repos.getLatestRelease({
                owner: 'charmbracelet',
                repo: 'crush'
              });
            } catch (e) {
              // If no releases exist yet, check latest tags instead
              const tags = await github.rest.repos.listTags({
                owner: 'charmbracelet',
                repo: 'crush',
                per_page: 1
              });
              if (tags.data.length === 0) {
                console.log('No upstream releases or tags found.');
                return;
              }
              upstreamRelease = { data: { tag_name: tags.data[0].name, html_url: `https://github.com/charmbracelet/crush/releases/tag/${tags.data[0].name}`, body: 'Tag detected (no formal release notes).' } };
            }

            const tag = upstreamRelease.data.tag_name;
            const releaseUrl = upstreamRelease.data.html_url;
            const releaseNotes = upstreamRelease.data.body || 'No release notes provided.';

            // Check if we already have an issue for this release
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              labels: 'upstream-release',
              per_page: 100
            });

            const alreadyTracked = existingIssues.data.some(
              issue => issue.title.includes(tag)
            );

            if (alreadyTracked) {
              console.log(`Release ${tag} already tracked. Skipping.`);
              return;
            }

            // Create an issue for the new release
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⬆️ Upstream release detected: ${tag}`,
              labels: ['upstream-release'],
              body: `## New Upstream Release: ${tag}\n\n**Release URL:** ${releaseUrl}\n\n### Release Notes\n${releaseNotes.substring(0, 2000)}\n\n---\n\n### Action Required\n\nReview the upstream changes and decide what to incorporate:\n\n#### Option 1: Cherry-pick specific commits\n\`\`\`bash\ngit remote add upstream https://github.com/charmbracelet/crush.git  # if not already added\ngit fetch upstream\ngit log upstream/main --oneline  # review commits\ngit cherry-pick <commit-hash>    # pick what you want\n\`\`\`\n\n#### Option 2: Merge entire release (higher risk of conflicts)\n\`\`\`bash\ngit fetch upstream\ngit merge upstream/main --no-commit  # review before committing\n\`\`\`\n\n#### Option 3: Skip this release\nClose this issue if the changes aren't relevant to your fork.\n\n---\n*This issue was auto-generated by the upstream monitor workflow.*`
            });

            console.log(`Created issue for upstream release ${tag}`);
